<div class="container py-4" style="max-width: 780px;">

  <div *ngIf="isLoading" class="d-flex justify-content-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!isLoading && errorMessage" class="alert alert-danger rounded-3">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && !errorMessage && posts.length === 0"
       class="text-center text-muted py-5">
    <p class="fs-5">No posts yet. Be the first to write one!</p>
  </div>

  <ng-container *ngIf="!isLoading && !errorMessage && posts.length > 0">
    <app-post-list-item *ngFor="let post of posts" [post]="post"></app-post-list-item>
  </ng-container>

</div>
